# Render Blueprint: one-click deploy of the Splitit API + managed Postgres.
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub/GitLab.
#   2. On https://dashboard.render.com -> "New" -> "Blueprint" -> pick this repo.
#   3. Render reads this file, provisions the DB + web service, and gives you a
#      public URL like https://splitit-api.onrender.com

databases:
  - name: splitit-db
    databaseName: splitit_db
    user: splitit
    plan: free

services:
  - type: web
    name: splitit-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Root path has no route; admin login returns 200 so use it for health checks.
    healthCheckPath: /admin/login/
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render generates a strong random secret.
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"      # leading dot => matches any *.onrender.com host
      - key: DATABASE_URL
        fromDatabase:
          name: splitit-db
          property: connectionString
